<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TES Agent{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar a { color: #e0e0e0; }
        .sidebar a:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar a.active { background: #16213e; color: #fff; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .tes-badge { font-size: 0.75rem; }
        .validity-active { color: #198754; }
        .validity-expired { color: #dc3545; }
        .validity-expiring { color: #fd7e14; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-3">
                <div class="text-center mb-4">
                    <h5 class="text-white">TES Agent</h5>
                    <small class="text-muted">Työehtosopimus</small>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/chat' in request.path %}active{% endif %}" href="/chat">
                            <i class="bi bi-chat-dots"></i> Chat
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/search' %}active{% endif %}" href="/search">
                            <i class="bi bi-search"></i> Semantic Search
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/tes' in request.path and '/tes/' not in request.path %}active{% endif %}" href="/tes">
                            <i class="bi bi-file-text"></i> TES Documents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/compare' in request.path %}active{% endif %}" href="/compare">
                            <i class="bi bi-columns-gap"></i> Compare
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/calculators' in request.path %}active{% endif %}" href="/calculators">
                            <i class="bi bi-calculator"></i> Salary Calculators
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/legal' in request.path %}active{% endif %}" href="/legal">
                            <i class="bi bi-book"></i> Legal References
                        </a>
                    </li>
                </ul>
            </nav>
            
            <main class="col-md-10 ms-sm-auto px-4 py-3">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
