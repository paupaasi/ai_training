{% extends "base.html" %}

{% block title %}New Family - Holiday Planner{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">
            <i class="fas fa-users text-purple-600 mr-2"></i> Create Family Profile
        </h1>

        <form action="/families/new" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Family Name</label>
                <input type="text" name="name" required
                       placeholder="e.g., The Smiths, Our Family"
                       class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Family Members</label>
                <div id="members-container" class="space-y-3">
                    <div class="member-row flex gap-3 items-center">
                        <input type="text" name="member_name[]" placeholder="Name"
                               class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <select name="member_role[]" class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="adult">Adult</option>
                            <option value="teen">Teen (12-17)</option>
                            <option value="child">Child (3-11)</option>
                            <option value="toddler">Toddler (1-2)</option>
                            <option value="infant">Infant (0-1)</option>
                            <option value="senior">Senior (65+)</option>
                        </select>
                        <input type="number" name="member_age[]" placeholder="Age" min="0" max="120"
                               class="w-20 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <button type="button" onclick="removeMember(this)" class="text-red-500 hover:text-red-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <button type="button" onclick="addMember()" 
                        class="mt-3 text-purple-600 hover:text-purple-800 text-sm">
                    <i class="fas fa-plus mr-1"></i> Add Member
                </button>
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition">
                    <i class="fas fa-save mr-2"></i> Create Family
                </button>
                <a href="/families" class="px-6 py-3 border rounded-lg hover:bg-gray-50 transition text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function addMember() {
    const container = document.getElementById('members-container');
    const row = document.createElement('div');
    row.className = 'member-row flex gap-3 items-center';
    row.innerHTML = `
        <input type="text" name="member_name[]" placeholder="Name"
               class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
        <select name="member_role[]" class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
            <option value="adult">Adult</option>
            <option value="teen">Teen (12-17)</option>
            <option value="child">Child (3-11)</option>
            <option value="toddler">Toddler (1-2)</option>
            <option value="infant">Infant (0-1)</option>
            <option value="senior">Senior (65+)</option>
        </select>
        <input type="number" name="member_age[]" placeholder="Age" min="0" max="120"
               class="w-20 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
        <button type="button" onclick="removeMember(this)" class="text-red-500 hover:text-red-700">
            <i class="fas fa-times"></i>
        </button>
    `;
    container.appendChild(row);
}

function removeMember(btn) {
    const rows = document.querySelectorAll('.member-row');
    if (rows.length > 1) {
        btn.closest('.member-row').remove();
    }
}
</script>
{% endblock %}
