{% extends "base.html" %}

{% block title %}Error - Holiday Planner{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="text-red-500 text-6xl mb-4">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Oops!</h1>
        <p class="text-gray-600 mb-6">{{ message or "Something went wrong" }}</p>
        <a href="/" class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition inline-block">
            <i class="fas fa-home mr-2"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
